{% extends "base.html" %}

{% block content %}
<button onclick="history.back()" class="btn btn-outline-dark mb-3">
    ← Go Back
</button>
<div class="card p-4 shadow mx-auto" style="max-width:400px;">
    
    <h3 class="text-center mb-3">Forgot Password</h3>

    {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        <input class="form-control mb-3" type="email" name="email" placeholder="Enter your email" required>

        <input class="form-control mb-3" type="password" name="new_password" placeholder="New Password" required>

        <input class="form-control mb-3" type="password" name="confirm_password" placeholder="Confirm Password" required>

        <button class="btn btn-primary w-100">Reset Password</button>

    </form>

</div>

{% endblock %}
