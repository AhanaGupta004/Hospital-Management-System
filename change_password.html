{% extends "base.html" %}

{% block content %}
<button onclick="history.back()" class="btn btn-outline-dark mb-3">
    ← Go Back
</button>
<div class="card p-4 shadow mx-auto" style="max-width:400px;">
    
    <h3 class="text-center mb-3">Change Password</h3>

    {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
    {% endif %}

    {% if success %}
        <div class="alert alert-success text-center">
            {{ success }}
        </div>
    {% endif %}

    <form method="POST">

        <input class="form-control mb-3" type="password" name="current_password" placeholder="Current Password" required>

        <input class="form-control mb-3" type="password" name="new_password" placeholder="New Password" required>

        <input class="form-control mb-3" type="password" name="confirm_password" placeholder="Confirm Password" required>

        <button class="btn btn-primary w-100">Update Password</button>

    </form>

</div>

{% endblock %}
