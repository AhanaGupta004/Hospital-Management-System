{% extends "base.html" %}

{% block content %}

<div class="card p-4 shadow mx-auto" style="max-width:400px;">
    
    <h3 class="text-center mb-3">Register</h3>

    <!-- 🔥 Error Message -->
    {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
    
        <input class="form-control mb-3" type="text" name="name" placeholder="Name" required>

        <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>

        <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

        <input class="form-control mb-3" type="number" name="age" placeholder="Age" required>

        <select class="form-control mb-3" name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        
        <button class="btn btn-success w-100">Register</button>

    </form>

    <p class="text-center mt-3">
        Already have an account? <a href="/login">Login here</a>
    </p>

</div>

{% endblock %}
